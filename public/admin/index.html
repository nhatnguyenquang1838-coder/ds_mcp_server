<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DW AgentOps Tasks</title>
    <link rel="stylesheet" href="/admin/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <p class="eyebrow">DW AgentOps</p>
        <h1>Tasks Control</h1>
      </div>
      <div class="topbar-actions">
        <input id="apiToken" type="password" placeholder="REST API bearer token" autocomplete="off" />
        <button id="saveTokenButton" class="secondary">Save token</button>
        <button id="refreshButton">Refresh</button>
      </div>
    </header>

    <main class="layout">
      <section class="panel sidebar">
        <div class="panel-heading">
          <div>
            <p class="eyebrow">Overview</p>
            <h2>Dashboard</h2>
          </div>
          <span id="apiStatus" class="pill muted">loading</span>
        </div>

        <div id="metrics" class="metrics"></div>

        <section class="stack security-panel">
          <div class="panel-heading">
            <div>
              <p class="eyebrow">Security</p>
              <h3>Posture</h3>
            </div>
            <span id="securityStatus" class="pill muted">loading</span>
          </div>
          <div id="securityControls" class="security-controls"></div>
          <div id="securitySignals" class="security-signals"></div>
        </section>

        <form id="createTaskForm" class="stack form-block">
          <h3>Create task</h3>
          <label>
            Title
            <input name="title" required placeholder="Review tenant contract CTA" />
          </label>
          <label>
            Description
            <textarea name="description" rows="4" placeholder="Context, expected outcome, constraints"></textarea>
          </label>
          <div class="grid-2">
            <label>
              Type
              <select name="task_type">
                <option value="task">task</option>
                <option value="spec">spec</option>
                <option value="design_review">design_review</option>
                <option value="implementation">implementation</option>
                <option value="validation">validation</option>
                <option value="bug">bug</option>
              </select>
            </label>
            <label>
              Priority
              <select name="priority">
                <option value="medium">medium</option>
                <option value="high">high</option>
                <option value="urgent">urgent</option>
                <option value="low">low</option>
              </select>
            </label>
          </div>
          <button type="submit">Create</button>
        </form>

        <form id="bulkCreateTaskForm" class="stack form-block">
          <h3>Bulk create tasks</h3>
          <label>
            Task array (JSON)
            <textarea name="tasks_json" rows="8" required placeholder='[{"title":"Task A","task_type":"task","priority":"medium"}]'></textarea>
          </label>
          <button type="submit" class="secondary">Create batch</button>
        </form>
      </section>

      <section class="panel main-panel">
        <div class="panel-heading">
          <div>
            <p class="eyebrow">Workflow</p>
            <h2>Tasks</h2>
          </div>
          <div class="filters">
            <input id="searchInput" placeholder="Search title or id" />
            <select id="stateFilter">
              <option value="">All states</option>
              <option value="draft">draft</option>
              <option value="ready">ready</option>
              <option value="blocked">blocked</option>
              <option value="agent_running">agent_running</option>
              <option value="pending_review">pending_review</option>
              <option value="pending_approval">pending_approval</option>
              <option value="write_running">write_running</option>
              <option value="validation_running">validation_running</option>
              <option value="completed">completed</option>
              <option value="failed">failed</option>
              <option value="cancelled">cancelled</option>
            </select>
          </div>
        </div>

        <section class="bulk-toolbar" aria-label="Bulk task actions">
          <div class="bulk-toolbar-heading">
            <label class="inline-check">
              <input id="selectAllTasks" type="checkbox" />
              Select visible
            </label>
            <strong id="selectedTaskCount">0 selected</strong>
          </div>
          <div class="bulk-action-grid">
            <label>
              Priority
              <select id="bulkPriority">
                <option value="">No change</option>
                <option value="low">low</option>
                <option value="medium">medium</option>
                <option value="high">high</option>
                <option value="urgent">urgent</option>
              </select>
            </label>
            <button id="bulkUpdateButton" type="button" class="secondary">Apply update</button>
            <label>
              Transition
              <select id="bulkTransition">
                <option value="SUBMIT">SUBMIT</option>
                <option value="RUN_AGENT">RUN_AGENT</option>
                <option value="BLOCK">BLOCK</option>
                <option value="UNBLOCK">UNBLOCK</option>
                <option value="CANCEL">CANCEL</option>
              </select>
            </label>
            <button id="bulkTransitionButton" type="button" class="secondary">Apply transition</button>
          </div>
          <div class="bulk-action-grid bulk-link-grid">
            <label>
              Link target task ID
              <input id="bulkLinkTarget" placeholder="task_xxx" />
            </label>
            <label>
              Link type
              <select id="bulkLinkType">
                <option value="depends_on">depends_on</option>
                <option value="blocks">blocks</option>
                <option value="relates_to">relates_to</option>
                <option value="parent_child">parent_child</option>
                <option value="implements">implements</option>
                <option value="validates">validates</option>
              </select>
            </label>
            <button id="bulkLinkButton" type="button" class="secondary">Link selected</button>
            <button id="bulkDeleteButton" type="button" class="danger">Delete selected</button>
          </div>
        </section>

        <div id="tasksList" class="tasks-list"></div>
      </section>

      <aside class="panel detail-panel">
        <div id="taskDetail" class="empty-state">
          Select a task to inspect workflow, links, and timeline.
        </div>
      </aside>

      <section class="panel workflow-panel">
        <div class="panel-heading">
          <div>
            <p class="eyebrow">Orchestration</p>
            <h2>Workflows</h2>
          </div>
          <button id="refreshWorkflowsButton" type="button" class="secondary">Refresh workflows</button>
        </div>

        <form id="createWorkflowForm" class="workflow-create-grid">
          <label>
            Name
            <input name="name" required placeholder="Repository change workflow" />
          </label>
          <label>
            Source
            <select name="source">
              <option value="web">web</option>
              <option value="chatgpt">chatgpt</option>
              <option value="system">system</option>
            </select>
          </label>
          <label>
            First task
            <select name="first_task_type">
              <option value="analyze_repo">analyze_repo</option>
              <option value="plan_changes">plan_changes</option>
              <option value="modify_code">modify_code</option>
              <option value="create_pr">create_pr</option>
              <option value="wait_github_ci">wait_github_ci</option>
              <option value="fix_ci">fix_ci</option>
              <option value="final_report">final_report</option>
            </select>
          </label>
          <label class="workflow-input-field">
            Input JSON
            <textarea name="input_json" rows="3" placeholder='{"repo":"owner/name","branch":"feature/example"}'></textarea>
          </label>
          <button type="submit">Create workflow</button>
        </form>

        <div class="workflow-layout">
          <div id="workflowsList" class="workflow-list"></div>
          <div id="workflowDetail" class="empty-state">Select a workflow to manage it.</div>
        </div>
      </section>
    </main>

    <div id="toast" class="toast" hidden></div>

    <script src="/admin/app.js" type="module"></script>
    <script src="/admin/bulk.js" type="module"></script>
  </body>
</html>
